{% extends "base.html" %}

{% block content %}
<div class="text-center mb-xl">
    <h1 id="jobTitle">Loading...</h1>
    <a href="/results" class="link-back">&larr; Back to Recommendations</a>
</div>

<div class="glass-card" style="margin-bottom: var(--spacing-lg);">
    <h2>Your Skill Match</h2>
    <div class="progress-container">
        <div id="progressFill" class="progress-fill" style="width: 0%;">0%</div>
    </div>
</div>

<div class="grid md:grid-cols-2">
    <div class="glass-card" style="background: rgba(16, 185, 129, 0.03);">
        <h2>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon" style="color: var(--color-success);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            Matching Skills
        </h2>
        <div id="matchingSkillsList" class="skill-badges-container">
            <!-- Badges injected by JS -->
        </div>
    </div>

    <div class="glass-card" style="background: rgba(239, 68, 68, 0.03);">
        <h2>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon" style="color: var(--color-danger);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            Skills to Acquire
        </h2>
        <div id="missingSkillsList" class="skill-badges-container">
            <!-- Badges injected by JS -->
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}?v=2"></script>
<script>
    document.addEventListener('DOMContentLoaded', initDetailsPage);
</script>
{% endblock %}
